<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин кроссовок — Практика 1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Магазин кроссовок</h1>
        
        <!-- Карточка 1 -->
        <div class="sneaker-card sneaker-card--accent">
            <img src="https://picsum.photos/id/1015/400/300" alt="Nike Air Force 1">
            <div class="sneaker-card__content">
                <h2 class="sneaker-card__title">Nike Air Force 1</h2>
                <p class="sneaker-card__desc">Классические белые кроссовки</p>
                <p class="sneaker-card__price">8 990 ₽</p>
                <a href="#" class="btn">Купить</a>
            </div>
        </div>

        <!-- Карточка 2 (обычная) -->
        <div class="sneaker-card">
            <img src="https://picsum.photos/id/201/400/300" alt="Adidas Stan Smith">
            <div class="sneaker-card__content">
                <h2 class="sneaker-card__title">Adidas Stan Smith</h2>
                <p class="sneaker-card__desc">Легендарные теннисные кроссовки</p>
                <p class="sneaker-card__price">7 500 ₽</p>
                <a href="#" class="btn">Купить</a>
            </div>
        </div>
    </div>
</body>
</html>
